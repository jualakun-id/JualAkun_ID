name = "jualakun-backend"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]
account_id = "821071ae5e28d3de9dc3635acd10db72"

# Non-secret env vars only — secrets via: wrangler secret put NAMA_KEY
[vars]
PUBLIC_API_URL = "https://api.jualakun.id"
PUBLIC_SITE_URL = "https://jualakun.id"
CORS_ORIGINS = "https://jualakun.id,https://www.jualakun.id,https://jual-akun-id.vercel.app,http://localhost:3000"

# Cron triggers (3 jadwal sesuai PRD Appendix E.7)
[triggers]
crons = [
  "*/5 * * * *",   # expire orders (24h timeout check)
  "*/30 * * * *",  # stock alerts (low-stock notifications)
  "*/10 * * * *",  # retry failed notifications
]

# Secrets to set via: wrangler secret put <NAME>
# - SUPABASE_URL
# - SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_ROLE_KEY
# - ENCRYPTION_KEY
# - QRIS_STATIC_PAYLOAD  (raw payload dari GoPay Saya QRIS, decode via zxing.org)
# - WAHA_BASE_URL
# - WAHA_API_KEY
# - WAHA_SESSION
# - RESEND_API_KEY
# - RESEND_FROM_EMAIL
# - ADMIN_WHATSAPP_NUMBER
# - ADMIN_WA_GROUP_ID  (opsional: WA group id "<num>@g.us" untuk broadcast alert kritis)
# - WAHA_STOCK_DIGEST_GROUP_ID  (opsional: WA group id "<num>@g.us" dedicated untuk stock digest 4x/hari)
# - ADMIN_EMAIL
# - SUPPLIER_CANBOSO_API_KEY
# - CRON_SECRET
